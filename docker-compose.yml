services:
  czlnav:
    image: docker.cnb.cool/czl/czlnav:latest
    container_name: czlnav
    ports:
      - "3000:3000"
    environment:
      APP_ENV: production
      APP_URL: ${APP_URL:-http://localhost:3000}
      PORT: 3000
      DATABASE_PATH: /app/data/database.db
      UPLOAD_DIR: /app/uploads
      FRONTEND_DIST_DIR: /app/frontend-out
      ADMIN_DIST_DIR: /app/frontend-out/admin
      CZL_CONNECT_CLIENT_ID: ${CZL_CONNECT_CLIENT_ID:-}
      CZL_CONNECT_CLIENT_SECRET: ${CZL_CONNECT_CLIENT_SECRET:-}
      AUTH_CALLBACK_URL: ${AUTH_CALLBACK_URL:-http://localhost:3000/api/auth/callback}
    volumes:
      - /data/czlnav/data:/app/data
      - /data/czlnav/data/uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
